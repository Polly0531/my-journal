<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顯化日記</title>

<style>
:root{
  --bg:#FBF7E9;
  --card:#fffdf5;
  --gold:#F1CC74;
  --text:#5c4b3a;
  --muted:#a0917f;
}

body{
  margin:0;
  padding:20px;
  font-family:"Noto Serif TC", serif;
  background:var(--bg);
  color:var(--text);
}

h1{
  text-align:center;
  letter-spacing:4px;
  margin:20px 0;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}

.label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
  letter-spacing:1px;
}

textarea,input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #eee;
  background:#fff;
  font-size:14px;
}

textarea{
  min-height:70px;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:40px;
  border:none;
  background:var(--gold);
  color:white;
  font-weight:bold;
  margin-top:10px;
}

.history-item{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>顯化日記 ✿</h1>

<div class="card" id="quote"></div>

<div class="card">
<div class="label">今天我選擇吸引</div>
<textarea id="attract"></textarea>
</div>

<div class="card">
<div class="label">我想成為</div>
<textarea id="become"></textarea>
</div>

<div class="card">
<div class="label">自訂肯定句</div>
<input id="affirm">
</div>

<div class="card">
<div class="label">已經實現（用已發生語氣）</div>
<textarea id="realized"></textarea>
</div>

<div class="card">
<div class="label">🙏 感恩清單</div>
<input id="g1" placeholder="我感恩⋯">
<input id="g2" placeholder="我感謝⋯">
<input id="g3" placeholder="宇宙給了我⋯">
</div>

<div class="card">
<div class="label">今日行動</div>
<input id="action">
</div>

<button class="btn" onclick="save()">儲存今日日記</button>
<button class="btn" onclick="toggleHistory()">歷史記錄</button>

<div class="card" id="history" style="display:none;"></div>

<script>
const quotes=[
"你所渴望的正在向你靠近",
"一切正在為你展開",
"你值得擁有美好的一切",
"宇宙正在支持你",
"你已經在成為你想成為的人"
];

const today=new Date().toISOString().slice(0,10);

document.getElementById("quote").innerText=
quotes[new Date().getDate()%quotes.length];

// 讀取
const saved=JSON.parse(localStorage.getItem(today)||"{}");

["attract","become","affirm","realized","g1","g2","g3","action"]
.forEach(id=>{
document.getElementById(id).value=saved[id]||"";
});

// 儲存
function save(){
const data={};
["attract","become","affirm","realized","g1","g2","g3","action"]
.forEach(id=>{
data[id]=document.getElementById(id).value;
});
localStorage.setItem(today,JSON.stringify(data));
alert("已儲存 ✨");
renderHistory();
}

// 歷史
function toggleHistory(){
const el=document.getElementById("history");
el.style.display=el.style.display==="none"?"block":"none";
renderHistory();
}

function renderHistory(){
const el=document.getElementById("history");
el.innerHTML="";

Object.keys(localStorage).sort().reverse().forEach(date=>{
try{
const item=JSON.parse(localStorage.getItem(date));
if(!item) return;

const div=document.createElement("div");
div.className="history-item";
div.innerText=date;

div.onclick=()=>{
["attract","become","affirm","realized","g1","g2","g3","action"]
.forEach(id=>{
document.getElementById(id).value=item[id]||"";
});
};

el.appendChild(div);
}catch{}
});
}
</script>

</body>
</html>
