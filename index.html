@keyframes floatDown {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 0.18; } 90% { opacity: 0.1; }
  100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes softPulse {
  0%, 100% { box-shadow: 0 4px 24px rgba(241,204,116,0.15); }
  50% { box-shadow: 0 4px 40px rgba(241,204,116,0.38); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes gentleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

#petals-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.orb1 { position: fixed; top: -120px; right: -120px; width: 380px; height: 380px; border-radius: 50%; background: radial-gradient(circle, rgba(241,204,116,0.2) 0%, transparent 70%); pointer-events: none; z-index: 0; animation: gentleFloat 10s ease-in-out infinite; }
.orb2 { position: fixed; bottom: -100px; left: -100px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(244,228,178,0.28) 0%, transparent 70%); pointer-events: none; z-index: 0; animation: gentleFloat 13s ease-in-out infinite reverse; }

#app { max-width: 460px; margin: 0 auto; padding: 0 16px 100px; position: relative; z-index: 1; }

/* Header */
.header { text-align: center; padding-top: 44px; padding-bottom: 4px; }
.header-divider { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 14px; }
.header-line { height: 1px; width: 40px; }
.header-line-l { background: linear-gradient(to right, transparent, var(--gold)); }
.header-line-r { background: linear-gradient(to left, transparent, var(--gold)); }
.header-flower { font-size: 18px; color: var(--gold); }
.header h1 { font-size: 24px; font-weight: 700; color: var(--brown); letter-spacing: 4px; margin-bottom: 6px; }
.header .date-sub { color: var(--muted); font-size: 12px; letter-spacing: 2px; }

/* Nav */
.nav { display: flex; gap: 6px; margin-top: 22px; background: #f0e6c0; border-radius: 40px; padding: 4px; }
.nav-btn { flex: 1; padding: 10px 0; border-radius: 36px; border: none; font-size: 13px; letter-spacing: 1px; cursor: pointer; font-family: 'Noto Serif TC', serif; transition: all 0.2s; }
.nav-btn.active { background: var(--input-bg); color: var(--brown); font-weight: 700; box-shadow: 0 2px 8px rgba(159,143,130,0.12); }
.nav-btn.inactive { background: transparent; color: var(--muted); font-weight: 400; }

/* API Key Setup */
#setup-screen { animation: fadeIn 0.4s ease; text-align: center; padding: 40px 0; }
.setup-card { background: var(--input-bg); border: 1.5px solid var(--gold); border-radius: 24px; padding: 32px 24px; margin-top: 24px; text-align: left; box-shadow: 0 4px 24px rgba(241,204,116,0.15); animation: softPulse 5s ease-in-out infinite; }
.setup-card h2 { font-size: 16px; color: var(--brown); letter-spacing: 2px; margin-bottom: 8px; text-align: center; }
.setup-card p { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 20px; text-align: center; }
.setup-card .steps { font-size: 13px; color: var(--text); line-height: 2; margin-bottom: 20px; }
.setup-card .steps a { color: var(--gold); }
.key-input-wrap { display: flex; flex-direction: column; gap: 10px; }
.key-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; letter-spacing: 1px; }
.key-input:focus { border-color: var(--gold); outline: none; }
.key-save-btn { width: 100%; padding: 14px; border-radius: 50px; border: 1.5px solid var(--gold); background: linear-gradient(135deg, var(--gold), #e8b84b); color: #fff; font-size: 15px; letter-spacing: 2px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 20px rgba(241,204,116,0.4); animation: softPulse 3s ease-in-out infinite; }
.key-note { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.7; }

/* Card */
.card { background: var(--input-bg); border: 1px solid var(--border); border-radius: 20px; padding: 22px 20px; margin-bottom: 14px; box-shadow: 0 2px 14px rgba(159,143,130,0.07); animation: fadeInUp 0.45s ease both; }
.card-gold { background: linear-gradient(135deg, var(--cream), #fef3cc); border: 1.5px solid var(--gold) !important; animation: fadeInUp 0.4s ease both, softPulse 5s ease-in-out infinite !important; text-align: center; }
.card-label { font-size: 12px; color: var(--brown); letter-spacing: 2px; display: block; margin-bottom: 10px; font-weight: 700; }
.date-theme-tag { font-size: 10px; color: var(--gold); letter-spacing: 4px; font-weight: 700; margin-bottom: 12px; }
.quote-text { font-size: 16px; line-height: 1.95; color: var(--text); font-style: italic; }
.affirm-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.affirm-row:last-child { margin-bottom: 0; }
.affirm-check { background: var(--gold); color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 3px; }
.affirm-text { font-size: 14px; line-height: 1.75; color: var(--text); }

/* Inputs */
.field-input, .field-textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 15px; color: var(--text); font-size: 15px; font-family: 'Noto Serif TC', serif; transition: border-color 0.2s; resize: vertical; }
.field-textarea { min-height: 78px; }
.field-input:focus, .field-textarea:focus { border-color: var(--gold); outline: none; }

/* Gratitude */
.grat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.grat-row:last-child { margin-bottom: 0; }
.grat-num { background: var(--cream); border: 1px solid var(--gold); color: var(--brown); font-size: 11px; font-weight: 700; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* Save button */
.save-btn { width: 100%; padding: 15px; border-radius: 50px; font-size: 15px; letter-spacing: 2px; cursor: pointer; font-weight: 700; transition: all 0.3s; }
.save-btn.unsaved { background: linear-gradient(135deg, var(--gold), #e8b84b); border: 1.5px solid var(--gold); color: #fff; box-shadow: 0 4px 20px rgba(241,204,116,0.4); animation: softPulse 3s ease-in-out infinite; }
.save-btn.saved { background: #f0e8ce; border: 1.5px solid var(--border); color: var(--muted); }
.closing-text { text-align: center; padding: 8px 0 20px; color: var(--muted); font-size: 13px; font-style: italic; line-height: 1.9; }

/* Loading */
.loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 48px; }
.spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--gold); animation: spin 1s linear infinite; }
.loading-text { color: var(--muted); font-size: 14px; letter-spacing: 2px; }

/* History */
.history-card { cursor: pointer; transition: all 0.2s; }
.history-card:hover { border-color: var(--gold) !important; box-shadow: 0 4px 20px rgba(241,204,116,0.2) !important; }
.history-date { font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 5px; font-weight: 700; }
.history-theme { font-size: 13px; color: var(--brown); letter-spacing: 1px; }
.history-preview { margin-top: 7px; font-size: 13px; color: var(--muted); line-height: 1.6; }
.history-arrow { color: var(--border); font-size: 20px; margin-left: 12px; }
.empty-state { text-align: center; padding: 60px 0; color: var(--muted); }
.empty-emoji { font-size: 40px; margin-bottom: 16px; }
.empty-text { font-size: 14px; line-height: 1.9; }

/* Detail */
.back-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 8px 0; letter-spacing: 1px; font-family: 'Noto Serif TC', serif; }
.detail-header { text-align: center; margin: 8px 0 22px; }
.detail-date { font-size: 11px; color: var(--gold); letter-spacing: 3px; margin-bottom: 5px; font-weight: 700; }
.detail-theme { font-size: 16px; color: var(--brown); font-weight: 700; }

/* Settings gear */
.settings-btn { position: fixed; bottom: 24px; right: 20px; width: 44px; height: 44px; border-radius: 50%; background: var(--cream); border: 1.5px solid var(--gold); color: var(--brown); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 2px 12px rgba(159,143,130,0.2); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(251,247,233,0.85); backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s; }
.modal-sheet { background: var(--input-bg); border: 1px solid var(--border); border-radius: 28px 28px 0 0; padding: 28px 24px 48px; width: 100%; max-width: 460px; box-shadow: 0 -4px 30px rgba(159,143,130,0.15); animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 14px; color: var(--brown); letter-spacing: 2px; font-weight: 700; margin-bottom: 16px; }
.modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.modal-key-display { font-size: 12px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; letter-spacing: 1px; margin-bottom: 12px; word-break: break-all; }
.modal-change-btn { width: 100%; padding: 12px; border-radius: 50px; border: 1.5px solid var(--border); background: transparent; color: var(--brown); font-size: 13px; letter-spacing: 1px; cursor: pointer; font-family: 'Noto Serif TC', serif; margin-bottom: 10px; }
.modal-delete-btn { width: 100%; padding: 12px; border-radius: 50px; border: 1.5px solid #f5b8b8; background: transparent; color: #c07070; font-size: 13px; letter-spacing: 1px; cursor: pointer; font-family: 'Noto Serif TC', serif; }

/* view transitions */
#view-today, #view-history, #view-detail { animation: fadeInUp 0.3s ease both; }

<script>
const STORAGE_KEY = 'manifestation_journal_entries';
const API_KEY_STORAGE = 'manifestation_api_key';
const THEMES = ['自信','豐盛','愛與連結','健康','勇氣','平靜'];

let state = {
  apiKey: '',
  entries: {},
  todayContent: null,
  form: { attract:'', become:'', affirmation:'', realized:'', gratitude1:'', gratitude2:'', gratitude3:'', action:'' },
  saved: false,
  currentView: 'today',
  selectedEntry: null,
};

const todayKey = new Date().toISOString().slice(0,10);
const weekdays = ['日','一','二','三','四','五','六'];
const weekday = weekdays[new Date().getDay()];

// Init petals
(function() {
  const container = document.getElementById('petals-container');
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    const x = Math.random() * 100;
    const delay = Math.random() * 8;
    const duration = Math.random() * 6 + 8;
    const size = Math.random() * 8 + 5;
    const colors = ['#F1CC74','#F4E4B2','#f5e8c8'];
    p.style.cssText = `position:absolute;left:${x}%;top:-20px;width:${size}px;height:${size}px;border-radius:50% 0 50% 0;background:${colors[i%3]};opacity:0.18;animation:floatDown ${duration}s ${delay}s linear infinite;`;
    container.appendChild(p);
  }
})();

// Date display
document.getElementById('date-display').textContent = todayKey.replace(/-/g,' · ') + ' · 週' + weekday;

// Bootstrap
window.onload = function() {
  state.apiKey = localStorage.getItem(API_KEY_STORAGE) || '';
  try { state.entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { state.entries = {}; }

  if (!state.apiKey) {
    showSetup();
  } else {
    showMainApp();
    if (state.entries[todayKey]) {
      state.todayContent = state.entries[todayKey].aiContent;
      state.form = state.entries[todayKey].form || state.form;
      state.saved = true;
      renderToday();
    } else {
      generateToday();
    }
  }
};

function showSetup() {
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('main-app').style.display = 'none';
}
function showMainApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
}

function saveApiKey() {
  const val = document.getElementById('key-input').value.trim();
  if (!val.startsWith('sk-')) { alert('請輸入有效的 API Key（以 sk- 開頭）'); return; }
  state.apiKey = val;
  localStorage.setItem(API_KEY_STORAGE, val);
  showMainApp();
  generateToday();
}

async function generateToday() {
  renderLoading();
  const theme = THEMES[new Date().getDay() % THEMES.length];
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': state.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `你是一位溫柔的靈性引導師，幫助人們練習顯化與感恩。請用繁體中文，以溫暖、有力量但不浮誇的語氣生成內容。今日主題：${theme}。只回傳JSON，不要任何Markdown或說明。格式：{"date_theme":"詩意主題名稱4-6字","quote":"引導語20-40字溫暖療癒","affirmations":["肯定句1","肯定句2","肯定句3"],"question1":"引導問題1已實現語氣吸引力","question2":"引導問題2已實現語氣成為更好的自己","closing":"溫柔結語15-25字"}`,
        messages: [{ role: 'user', content: `生成今天（${todayKey}）顯化日記引導，主題：${theme}` }],
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content.map(b => b.text || '').join('');
    state.todayContent = JSON.parse(raw.replace(/```json|```/g,'').trim());
  } catch(e) {
    state.todayContent = {
      date_theme:'溫柔顯化日', quote:'你所渴望的一切，都在悄悄向你靠近。放鬆，接受，感謝。',
      affirmations:['我值得擁有美好的一切','豐盛與愛自然流向我','我相信生命正在支持我'],
      question1:'今天哪些美好的事物已經來到我的生命中？',
      question2:'今天我已經成為了更有力量的自己，這體現在⋯',
      closing:'你是被愛著的，一直都是。🌸',
    };
    if (e.message && e.message.includes('401')) {
      alert('API Key 無效，請重新設定。');
      deleteKey();
      return;
    }
  }
  renderToday();
}

function renderLoading() {
  document.getElementById('view-today').innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p class="loading-text">今日暖語準備中⋯</p>
    </div>`;
}

function renderToday() {
  if (!state.todayContent) return;
  const tc = state.todayContent;
  const f = state.form;
  const saved = state.saved;

  const affirmHtml = tc.affirmations.map(a => `
    <div class="affirm-row">
      <span class="affirm-check">✓</span>
      <span class="affirm-text">${esc(a)}</span>
    </div>`).join('');

  const fields = [
    { icon:'🌼', label:'今天我選擇吸引', key:'attract', hint: tc.question1, multi:true },
    { icon:'🌱', label:'我今天想成為', key:'become', hint: tc.question2, multi:true },
    { icon:'💛', label:'自訂肯定句', key:'affirmation', hint:'寫下一句屬於你的肯定句', multi:false },
    { icon:'✨', label:'已經實現（用已發生的語氣）', key:'realized', hint:'感謝宇宙，我已經⋯', multi:true },
  ];

  const fieldsHtml = fields.map((fd, i) => `
    <div class="card" style="animation-delay:${0.13+i*0.07}s">
      <label class="card-label">${fd.icon} ${fd.label}</label>
      ${fd.multi
        ? `<textarea class="field-textarea" placeholder="${esc(fd.hint)}" oninput="updateForm('${fd.key}',this.value)">${esc(f[fd.key])}</textarea>`

```
    : `<input class="field-input" type="text" placeholder="${esc(fd.hint)}" value="${esc(f[fd.key])}" oninput="updateForm('${fd.key}',this.value)" />`
  }
</div>`).join('');
```

const gratHtml = [‘gratitude1’,‘gratitude2’,‘gratitude3’].map((key,i) => ` <div class="grat-row"> <span class="grat-num">${i+1}</span> <input class="field-input" type="text" placeholder="${['我感恩⋯','我感謝⋯','宇宙給了我⋯'][i]}" value="${esc(f[key])}" oninput="updateForm('${key}',this.value)" /> </div>`).join(’’);

document.getElementById(‘view-today’).innerHTML = `<div class="card card-gold" style="border-radius:24px;padding:24px 22px;"> <div class="date-theme-tag">✦ ${esc(tc.date_theme)} ✦</div> <p class="quote-text">「${esc(tc.quote)}」</p> </div> <div class="card" style="animation-delay:0.08s">${affirmHtml.replace('<div class="affirm-row">','<div class="card-label">今日肯定句</div><div class="affirm-row">')}</div> ${fieldsHtml} <div class="card" style="animation-delay:0.41s"> <div class="card-label">🙏 感恩清單</div> ${gratHtml} </div> <div class="card" style="animation-delay:0.48s"> <label class="card-label">🌟 今日行動（一小步就好）</label> <input class="field-input" type="text" placeholder="今天我會做的一件小事是⋯" value="${esc(f.action)}" oninput="updateForm('action',this.value)" /> </div> <div class="closing-text">${esc(tc.closing)}</div> <button class="save-btn ${saved?'saved':'unsaved'}" onclick="saveEntry()"> ${saved ? '✿ 已儲存 ✿' : '✿ 儲存今日日記 ✿'} </button>`;
}

function updateForm(key, val) {
state.form[key] = val;
state.saved = false;
const btn = document.querySelector(’.save-btn’);
if (btn) { btn.className = ‘save-btn unsaved’; btn.textContent = ‘✿ 儲存今日日記 ✿’; }
}

function saveEntry() {
const newEntries = { …state.entries, [todayKey]: { aiContent: state.todayContent, form: state.form, savedAt: new Date().toISOString() } };
state.entries = newEntries;
state.saved = true;
localStorage.setItem(STORAGE_KEY, JSON.stringify(newEntries));
const btn = document.querySelector(’.save-btn’);
if (btn) { btn.className = ‘save-btn saved’; btn.textContent = ‘✿ 已儲存 ✿’; }
}

function renderHistory() {
const entries = Object.entries(state.entries).sort(([a],[b]) => b.localeCompare(a));
if (entries.length === 0) {
document.getElementById(‘view-history’).innerHTML = ` <div class="empty-state"> <div class="empty-emoji">🌸</div> <p class="empty-text">還沒有日記記錄<br/>從今天開始你的顯化旅程吧</p> </div>`;
return;
}
document.getElementById(‘view-history’).innerHTML = entries.map(([date, entry], i) => `<div class="card history-card" style="animation-delay:${i*0.06}s" onclick="showDetail('${date}')"> <div style="display:flex;justify-content:space-between;align-items:center;"> <div style="flex:1"> <div class="history-date">${date===todayKey?'今天 · ':''}${date.replace(/-/g,' · ')}</div> ${entry.aiContent ?`<div class="history-theme">✿ ${esc(entry.aiContent.date_theme)}</div>`: ''} ${entry.form?.attract ?`<p class="history-preview">「${esc(entry.form.attract.slice(0,28))}${entry.form.attract.length>28?‘⋯’:’’}」</p>` : ''} </div> <span class="history-arrow">›</span> </div> </div>`).join(’’);
}

function showDetail(date) {
state.selectedEntry = { date, entry: state.entries[date] };
switchView(‘detail’);
}

function renderDetail() {
const { date, entry } = state.selectedEntry;
const { aiContent, form: f } = entry;

const fields = [
{ label:‘今天我選擇吸引’, value: f?.attract },
{ label:‘我想成為’, value: f?.become },
{ label:‘自訂肯定句’, value: f?.affirmation },
{ label:‘已經實現’, value: f?.realized },
].filter(x => x.value);

const gratsHtml = [f?.gratitude1, f?.gratitude2, f?.gratitude3].filter(Boolean).map(g =>
`<div style="display:flex;gap:10px;margin-bottom:8px;"><span style="color:var(--gold);font-weight:700;">✿</span><p style="margin:0;font-size:14px;line-height:1.75;color:var(--text);">${esc(g)}</p></div>`
).join(’’);

document.getElementById(‘view-detail’).innerHTML = `<button class="back-btn" onclick="switchView('history')">‹ 返回記錄</button> <div class="detail-header"> <div class="detail-date">${date.replace(/-/g,' · ')}</div> ${aiContent ?`<div class="detail-theme">✿ ${esc(aiContent.date_theme)}</div>`: ''} </div> ${aiContent ?`
<div class="card" style="background:var(--cream);border:1.5px solid var(--gold);text-align:center;">
<p style="font-size:14px;line-height:1.9;color:var(--text);font-style:italic;">「${esc(aiContent.quote)}」</p>
</div>`: ''} ${fields.map(({label,value}) =>`
<div class="card">
<div class="card-label" style="margin-bottom:6px;">${label}</div>
<p style="margin:0;font-size:14px;line-height:1.8;color:var(--text);">${esc(value)}</p>
</div>`).join('')} ${gratsHtml ? `
<div class="card">
<div class="card-label" style="margin-bottom:10px;">感恩清單</div>
${gratsHtml}
</div>`: ''} ${f?.action ?`
<div class="card">
<div class="card-label" style="margin-bottom:6px;">今日行動</div>
<p style="margin:0;font-size:14px;line-height:1.8;color:var(--text);">${esc(f.action)}</p>
</div>`: ''} ${aiContent?.closing ?`<div class="closing-text">${esc(aiContent.closing)}</div>`: ''}`;
}

function switchView(view) {
state.currentView = view;
[‘today’,‘history’,‘detail’].forEach(v => {
document.getElementById(‘view-’+v).style.display = v===view ? ‘block’ : ‘none’;
const btn = document.getElementById(‘nav-’+v);
if (btn) { btn.className = ’nav-btn ’ + (v===view?‘active’:‘inactive’); }
});
if (view === ‘history’) renderHistory();
if (view === ‘detail’) renderDetail();
if (view === ‘today’ && state.todayContent) renderToday();
}

function openSettings() {
const key = state.apiKey;
document.getElementById(‘key-display’).textContent = key ? key.slice(0,8) + ‘••••••••••••••••’ + key.slice(-4) : ‘未設定’;
document.getElementById(‘settings-modal’).style.display = ‘block’;
}
function closeSettings() { document.getElementById(‘settings-modal’).style.display = ‘none’; }
function closeSettingsIfOutside(e) { if (e.target === e.currentTarget) closeSettings(); }
function changeKey() {
closeSettings();
const newKey = prompt(‘請輸入新的 API Key：’);
if (newKey && newKey.startsWith(‘sk-’)) {
state.apiKey = newKey;
localStorage.setItem(API_KEY_STORAGE, newKey);
alert(‘✿ API Key 已更新’);
}
}
function deleteKey() {
if (confirm(‘確定要刪除 API Key 嗎？’)) {
localStorage.removeItem(API_KEY_STORAGE);
state.apiKey = ‘’;
closeSettings();
showSetup();
}
}

function esc(str) {
if (!str) return ‘’;
return String(str).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’).replace(/’/g,’'’);
}
</script>

</body>
</html>
