<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="顯化日記" />
  <meta name="theme-color" content="#FBF7E9" />
  <title>顯化日記 ✿</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FBF7E9; --cream: #F4E4B2; --gold: #F1CC74;
      --brown: #9F8F82; --text: #5c4b3a; --muted: #a0917f;
      --border: #e8d9b0; --input-bg: #fffdf5;
      --shadow: rgba(159,143,130,0.08);
      --success: #d7f0df;
      --danger: #f7d6d6;
    }
    html, body { background: var(--bg); font-family: 'Noto Serif TC', serif; color: var(--text); min-height: 100vh; }
    body { transition: background .25s ease; }
    input, textarea, button, select { font-family: 'Noto Serif TC', serif; }
    textarea::placeholder, input::placeholder { color: #c4b49a; }
    textarea:focus, input:focus { outline: none; }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(159,143,130,0.3); border-radius: 2px; }

    @keyframes floatDown {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.18; } 90% { opacity: 0.1; }
      100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 4px 24px color-mix(in srgb, var(--gold) 26%, transparent); }
      50% { box-shadow: 0 4px 40px color-mix(in srgb, var(--gold) 42%, transparent); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    #petals-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb1 { position: fixed; top: -120px; right: -120px; width: 380px; height: 380px; border-radius: 50%; background: radial-gradient(circle, color-mix(in srgb, var(--gold) 22%, transparent) 0%, transparent 70%); pointer-events: none; z-index: 0; animation: gentleFloat 10s ease-in-out infinite; }
    .orb2 { position: fixed; bottom: -100px; left: -100px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, color-mix(in srgb, var(--cream) 32%, transparent) 0%, transparent 70%); pointer-events: none; z-index: 0; animation: gentleFloat 13s ease-in-out infinite reverse; }

    #app { max-width: 460px; margin: 0 auto; padding: 0 16px 100px; position: relative; z-index: 1; }
    .header { text-align: center; padding-top: 44px; padding-bottom: 4px; }
    .header-divider { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 14px; }
    .header-line { height: 1px; width: 40px; }
    .header-line-l { background: linear-gradient(to right, transparent, var(--gold)); }
    .header-line-r { background: linear-gradient(to left, transparent, var(--gold)); }
    .header-flower { font-size: 18px; color: var(--gold); }
    .header h1 { font-size: 24px; font-weight: 700; color: var(--brown); letter-spacing: 4px; margin-bottom: 6px; }
    .header .date-sub { color: var(--muted); font-size: 12px; letter-spacing: 2px; }

    .nav { display: flex; gap: 6px; margin-top: 22px; background: color-mix(in srgb, var(--cream) 80%, white 20%); border-radius: 40px; padding: 4px; }
    .nav-btn { flex: 1; padding: 10px 0; border-radius: 36px; border: none; font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .nav-btn.active { background: var(--input-bg); color: var(--brown); font-weight: 700; box-shadow: 0 2px 8px rgba(159,143,130,0.12); }
    .nav-btn.inactive { background: transparent; color: var(--muted); font-weight: 400; }

    .card { background: var(--input-bg); border: 1px solid var(--border); border-radius: 20px; padding: 22px 20px; margin-bottom: 14px; box-shadow: 0 2px 14px var(--shadow); animation: fadeInUp 0.45s ease both; }
    .card-gold { background: linear-gradient(135deg, var(--cream), color-mix(in srgb, var(--gold) 18%, white 82%)); border: 1.5px solid var(--gold) !important; animation: fadeInUp 0.4s ease both, softPulse 5s ease-in-out infinite !important; text-align: center; }
    .card-label { font-size: 12px; color: var(--brown); letter-spacing: 2px; display: block; margin-bottom: 10px; font-weight: 700; }
    .date-theme-tag { font-size: 10px; color: var(--gold); letter-spacing: 4px; font-weight: 700; margin-bottom: 12px; }
    .quote-text { font-size: 16px; line-height: 1.95; color: var(--text); font-style: italic; }
    .affirm-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .affirm-row:last-child { margin-bottom: 0; }
    .affirm-check { background: var(--gold); color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 3px; }
    .affirm-text { font-size: 14px; line-height: 1.75; color: var(--text); }

    .field-input, .field-textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 15px; color: var(--text); font-size: 15px; transition: border-color 0.2s; resize: vertical; }
    .field-textarea { min-height: 78px; }
    .field-input:focus, .field-textarea:focus { border-color: var(--gold); outline: none; }

    .grat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .grat-row:last-child { margin-bottom: 0; }
    .grat-num { background: var(--cream); border: 1px solid var(--gold); color: var(--brown); font-size: 11px; font-weight: 700; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .save-btn, .secondary-btn { width: 100%; padding: 15px; border-radius: 50px; font-size: 15px; letter-spacing: 2px; cursor: pointer; font-weight: 700; transition: all 0.3s; border: none; }
    .save-btn.unsaved { background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 75%, #d9a23a 25%)); border: 1.5px solid var(--gold); color: #fff; box-shadow: 0 4px 20px color-mix(in srgb, var(--gold) 42%, transparent); animation: softPulse 3s ease-in-out infinite; }
    .save-btn.saved { background: #f0e8ce; border: 1.5px solid var(--border); color: var(--muted); }
    .secondary-btn { background: transparent; border: 1.5px solid var(--border); color: var(--brown); }
    .closing-text { text-align: center; padding: 8px 0 20px; color: var(--muted); font-size: 13px; font-style: italic; line-height: 1.9; }

    .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 48px; }
    .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--gold); animation: spin 1s linear infinite; }
    .loading-text { color: var(--muted); font-size: 14px; letter-spacing: 2px; }

    .history-card { cursor: pointer; transition: all 0.2s; }
    .history-card:hover { border-color: var(--gold) !important; box-shadow: 0 4px 20px color-mix(in srgb, var(--gold) 28%, transparent) !important; }
    .history-date { font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 5px; font-weight: 700; }
    .history-theme { font-size: 13px; color: var(--brown); letter-spacing: 1px; }
    .history-preview { margin-top: 7px; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .history-arrow { color: var(--border); font-size: 20px; margin-left: 12px; }
    .empty-state { text-align: center; padding: 60px 0; color: var(--muted); }
    .empty-emoji { font-size: 40px; margin-bottom: 16px; }
    .empty-text { font-size: 14px; line-height: 1.9; }

    .back-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 8px 0; letter-spacing: 1px; }
    .detail-header { text-align: center; margin: 8px 0 22px; }
    .detail-date { font-size: 11px; color: var(--gold); letter-spacing: 3px; margin-bottom: 5px; font-weight: 700; }
    .detail-theme { font-size: 16px; color: var(--brown); font-weight: 700; }

    .settings-btn { position: fixed; bottom: 24px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--cream); border: 1.5px solid var(--gold); color: var(--brown); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 2px 12px rgba(159,143,130,0.2); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(251,247,233,0.85); backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s; }
    .modal-sheet { background: var(--input-bg); border: 1px solid var(--border); border-radius: 28px 28px 0 0; padding: 24px 24px 36px; width: 100%; max-width: 460px; box-shadow: 0 -4px 30px rgba(159,143,130,0.15); animation: slideUp 0.3s ease; max-height: 88vh; overflow: auto; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-size: 14px; color: var(--brown); letter-spacing: 2px; font-weight: 700; margin-bottom: 18px; }
    .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
    .modal-section { margin-bottom: 18px; }
    .modal-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; letter-spacing: 1px; }
    .theme-row { display: flex; gap: 10px; }
    .theme-chip { flex: 1; padding: 12px 0; border-radius: 999px; border: 1.5px solid var(--border); background: transparent; color: var(--brown); cursor: pointer; font-size: 13px; }
    .theme-chip.active { border-color: var(--gold); box-shadow: inset 0 0 0 1px var(--gold); }
    .modal-btn { width: 100%; padding: 12px; border-radius: 50px; border: 1.5px solid var(--border); background: transparent; color: var(--brown); font-size: 13px; letter-spacing: 1px; cursor: pointer; margin-bottom: 10px; }
    .modal-delete-btn { border-color: #f5b8b8; color: #c07070; }
    .note { font-size: 12px; color: var(--muted); line-height: 1.7; }

    .toast { position: fixed; left: 50%; bottom: 92px; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 16px; border-radius: 999px; font-size: 12px; z-index: 300; opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

    #view-today, #view-history, #view-detail { animation: fadeInUp 0.3s ease both; }

    @media (max-width: 380px) {
      .header h1 { font-size: 22px; }
      .card { padding: 18px 16px; }
    }
  </style>
</head>
<body>

<div id="petals-container"></div>
<div class="orb1"></div>
<div class="orb2"></div>

<div id="app">
  <div class="header">
    <div class="header-divider">
      <div class="header-line header-line-l"></div>
      <span class="header-flower">✿</span>
      <div class="header-line header-line-r"></div>
    </div>
    <h1>顯化日記</h1>
    <p class="date-sub" id="date-display"></p>
  </div>

  <div id="main-app">
    <nav class="nav">
      <button class="nav-btn active" id="nav-today" onclick="switchView('today')">✿ 今日日記</button>
      <button class="nav-btn inactive" id="nav-history" onclick="switchView('history')">◎ 歷史記錄</button>
    </nav>

    <div id="view-today" style="margin-top:24px;"></div>
    <div id="view-history" style="margin-top:24px;display:none;"></div>
    <div id="view-detail" style="margin-top:20px;display:none;"></div>
  </div>
</div>

<button class="settings-btn" onclick="openSettings()" title="設定">⚙</button>

<div id="settings-modal" style="display:none;">
  <div class="modal-overlay" onclick="closeSettingsIfOutside(event)">
    <div class="modal-sheet">
      <button class="modal-close" onclick="closeSettings()">×</button>
      <div class="modal-title">⚙ 小設定</div>

      <div class="modal-section">
        <div class="modal-label">主題顏色</div>
        <div class="theme-row">
          <button class="theme-chip" id="theme-gold" onclick="setTheme('gold')">金色</button>
          <button class="theme-chip" id="theme-pink" onclick="setTheme('pink')">粉色</button>
          <button class="theme-chip" id="theme-green" onclick="setTheme('green')">綠色</button>
        </div>
      </div>

      <div class="modal-section">
        <button class="modal-btn" onclick="regenerateToday()">重新抽一組今日引導</button>
        <button class="modal-btn" onclick="exportImage()">匯出今日圖片</button>
        <button class="modal-btn" onclick="exportPDF()">匯出今日 PDF</button>
      </div>

      <div class="modal-section">
        <div class="modal-label">主畫面捷徑 / App 感</div>
        <p class="note">iPhone：Safari 右下角分享 → 加入主畫面。加入後打開會更像 App。</p>
      </div>

      <div class="modal-section">
        <button class="modal-btn modal-delete-btn" onclick="clearAllEntries()">清除所有日記資料</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'manifestation_journal_entries_v2';
const THEME_KEY = 'manifestation_theme_v1';
const CONTENT_PICK_KEY = 'manifestation_today_pick_v1';

const CONTENT_LIBRARY = [
  { date_theme:'溫柔顯化日', quote:'你所渴望的一切，都在悄悄向你靠近。', affirmations:['我值得擁有美好的一切','生命正在溫柔地支持我','我安心地接住今天的禮物'], question1:'今天有哪些美好，已經來到我的生命中？', question2:'今天的我，已經成為了怎樣更穩定而明亮的人？', closing:'慢慢寫，今天也會溫柔地展開。🌸' },
  { date_theme:'豐盛流動日', quote:'豐盛不是追趕，而是允許。', affirmations:['我允許資源與機會流向我','我值得被支持與照顧','我以平靜接住屬於我的豐盛'], question1:'今天有哪些支持與資源，已經在我身邊？', question2:'我已經成為一個更願意接收的人，這體現在⋯', closing:'放鬆一點，豐盛會自己靠近。✨' },
  { date_theme:'愛與連結日', quote:'你本身就是值得被愛的存在。', affirmations:['我值得被真心對待','愛會自然流向我','我與世界保持溫柔連結'], question1:'今天我已經感受到哪些愛與善意？', question2:'我已經成為更柔軟、更真誠的人，這體現在⋯', closing:'你一直都在愛裡，被溫柔看見。🤍' },
  { date_theme:'平靜安定日', quote:'真正的力量，常常來自內在的安定。', affirmations:['我可以慢下來並相信自己','平靜正在回到我心裡','我的內在足夠穩定而清明'], question1:'今天有哪些片刻，讓我感到安定？', question2:'我已經成為更沉著的人，這體現在⋯', closing:'今天不必急，穩穩地就很好。🍃' },
  { date_theme:'勇氣綻放日', quote:'你不需要完全不害怕，才能往前。', affirmations:['我有勇氣為自己選擇','我允許自己帶著不確定前進','我的每一小步都很珍貴'], question1:'今天我已經勇敢做了哪些選擇？', question2:'我已經成為更有力量的人，這體現在⋯', closing:'小小一步，也是在打開新的路。🔥' },
  { date_theme:'自信發光日', quote:'當你相信自己，世界也會開始回應你。', affirmations:['我相信自己的價值','我有能力做好重要的事','我的光會自然被看見'], question1:'今天我的優點與能力，已經在哪裡展現？', question2:'我已經成為更自信的人，這體現在⋯', closing:'把自己站穩，就是最美的開始。☀️' },
  { date_theme:'療癒修復日', quote:'每一次柔軟地照顧自己，都是一種療癒。', affirmations:['我允許自己慢慢恢復','我值得被好好安放','今天的我已經比昨天更完整'], question1:'今天有哪些事情，正在溫柔修復我？', question2:'我已經成為更懂得照顧自己的人，這體現在⋯', closing:'不用急著變好，先被自己抱住。🌙' },
  { date_theme:'喜悅吸引日', quote:'喜悅會打開更多值得期待的事。', affirmations:['快樂對我來說是安全的','我願意接住生活的明亮','喜悅自然流進我的日常'], question1:'今天有哪些小事，已經讓我開心？', question2:'我已經成為更會享受生活的人，這體現在⋯', closing:'讓自己快樂，也是一種顯化。🫶' },
  { date_theme:'清晰前進日', quote:'當內心清楚，路就會慢慢浮現。', affirmations:['我知道自己正在走向哪裡','答案會在安靜中浮現','我相信當下的方向感'], question1:'今天有哪些訊號，正在幫助我更清楚？', question2:'我已經成為更有方向感的人，這體現在⋯', closing:'不用一次看完全部，只要看見下一步。🕊️' },
  { date_theme:'感恩擴張日', quote:'感恩會讓已擁有的光變得更明亮。', affirmations:['我珍惜現在所擁有的','感恩讓我更靠近豐盛','我的心正在變得柔軟而富足'], question1:'今天有哪些事，值得我真心感謝？', question2:'我已經成為更富足的人，這體現在⋯', closing:'感恩不是客氣，是在看見幸福。🌼' },
  { date_theme:'新開始之日', quote:'每一天都可以重新開始，任何時候都不晚。', affirmations:['我允許自己重新出發','新的可能性正在向我打開','今天就是新的開始'], question1:'今天有什麼正在為我重新展開？', question2:'我已經成為更願意開始的人，這體現在⋯', closing:'新的頁面，正在被你溫柔寫下。📖' },
  { date_theme:'自在呼吸日', quote:'先把呼吸放慢，答案就會靠近。', affirmations:['我讓自己留在當下','我的身心正在慢慢放鬆','安穩會透過呼吸回到我身上'], question1:'今天有哪些時刻，讓我真正放鬆？', question2:'我已經成為更自在的人，這體現在⋯', closing:'先呼吸，再出發，今天依然來得及。🌿' }
];

let state = {
  entries: {},
  todayContent: null,
  form: { attract:'', become:'', affirmation:'', realized:'', gratitude1:'', gratitude2:'', gratitude3:'', action:'' },
  saved: false,
  currentView: 'today',
  selectedEntry: null,
  theme: 'gold',
  todayKey: '',
};

const weekdays = ['日','一','二','三','四','五','六'];

function getLocalDateKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

(function initPetals() {
  const container = document.getElementById('petals-container');
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    const x = Math.random() * 100;
    const delay = Math.random() * 8;
    const duration = Math.random() * 6 + 8;
    const size = Math.random() * 8 + 5;
    const colors = ['var(--gold)','var(--cream)','color-mix(in srgb, var(--gold) 55%, white 45%)'];
    p.style.cssText = `position:absolute;left:${x}%;top:-20px;width:${size}px;height:${size}px;border-radius:50% 0 50% 0;background:${colors[i%3]};opacity:0.18;animation:floatDown ${duration}s ${delay}s linear infinite;`;
    container.appendChild(p);
  }
})();

window.onload = function() {
  state.todayKey = getLocalDateKey();
  document.getElementById('date-display').textContent = formatDate(state.todayKey);

  try { state.entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { state.entries = {}; }
  state.theme = localStorage.getItem(THEME_KEY) || 'gold';
  applyTheme(state.theme);
  updateThemeUI();

  if (state.entries[state.todayKey]) {
    state.todayContent = state.entries[state.todayKey].aiContent;
    state.form = state.entries[state.todayKey].form || state.form;
    state.saved = true;
  } else {
    state.todayContent = getTodayPreset();
  }

  renderToday();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
};

function formatDate(dateKey) {
  const [y,m,d] = dateKey.split('-');
  const wd = weekdays[new Date(`${dateKey}T12:00:00`).getDay()];
  return `${y} · ${m} · ${d} · 週${wd}`;
}

function getTodayPreset() {
  const savedPick = localStorage.getItem(CONTENT_PICK_KEY);
  if (savedPick) {
    try {
      const parsed = JSON.parse(savedPick);
      if (parsed.date === state.todayKey && CONTENT_LIBRARY[parsed.index]) return CONTENT_LIBRARY[parsed.index];
    } catch {}
  }
  const seed = Number(state.todayKey.replaceAll('-',''));
  const index = seed % CONTENT_LIBRARY.length;
  localStorage.setItem(CONTENT_PICK_KEY, JSON.stringify({ date: state.todayKey, index }));
  return CONTENT_LIBRARY[index];
}

function regenerateToday() {
  const currentIndex = CONTENT_LIBRARY.findIndex(x => x.date_theme === state.todayContent?.date_theme && x.quote === state.todayContent?.quote);
  const nextIndex = (currentIndex + 1 + Math.floor(Math.random()*3)) % CONTENT_LIBRARY.length;
  state.todayContent = CONTENT_LIBRARY[nextIndex];
  state.saved = false;
  localStorage.setItem(CONTENT_PICK_KEY, JSON.stringify({ date: state.todayKey, index: nextIndex }));
  renderToday();
  closeSettings();
  showToast('已換一組今日引導');
}

function renderLoading() {
  document.getElementById('view-today').innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p class="loading-text">內容準備中⋯</p>
    </div>`;
}

function renderToday() {
  if (!state.todayContent) return;
  const tc = state.todayContent;
  const f = state.form;
  const saved = state.saved;

  const affirmHtml = tc.affirmations.map(a => `
    <div class="affirm-row">
      <span class="affirm-check">✓</span>
      <span class="affirm-text">${esc(a)}</span>
    </div>`).join('');

  const fields = [
    { icon:'🌼', label:'今天我選擇吸引', key:'attract', hint: tc.question1, multi:true },
    { icon:'🌱', label:'我今天想成為', key:'become', hint: tc.question2, multi:true },
    { icon:'💛', label:'自訂肯定句', key:'affirmation', hint:'寫下一句屬於你的肯定句', multi:false },
    { icon:'✨', label:'已經實現（用已發生的語氣）', key:'realized', hint:'感謝宇宙，我已經⋯', multi:true },
  ];

  const fieldsHtml = fields.map((fd, i) => `
    <div class="card" style="animation-delay:${0.13+i*0.07}s">
      <label class="card-label">${fd.icon} ${fd.label}</label>
      ${fd.multi
        ? `<textarea class="field-textarea" placeholder="${esc(fd.hint)}" oninput="updateForm('${fd.key}',this.value)">${esc(f[fd.key])}</textarea>`
        : `<input class="field-input" type="text" placeholder="${esc(fd.hint)}" value="${esc(f[fd.key])}" oninput="updateForm('${fd.key}',this.value)" />`
      }
    </div>`).join('');

  const gratHtml = ['gratitude1','gratitude2','gratitude3'].map((key,i) => `
    <div class="grat-row">
      <span class="grat-num">${i+1}</span>
      <input class="field-input" type="text" placeholder="${['我感恩⋯','我感謝⋯','宇宙給了我⋯'][i]}" value="${esc(f[key])}" oninput="updateForm('${key}',this.value)" />
    </div>`).join('');

  document.getElementById('view-today').innerHTML = `
    <div id="export-target">
      <div class="card card-gold" style="border-radius:24px;padding:24px 22px;">
        <div class="date-theme-tag">✦ ${esc(tc.date_theme)} ✦</div>
        <p class="quote-text">「${esc(tc.quote)}」</p>
      </div>

      <div class="card" style="animation-delay:0.08s">
        <div class="card-label">今日肯定句</div>
        ${affirmHtml}
      </div>

      ${fieldsHtml}

      <div class="card" style="animation-delay:0.41s">
        <div class="card-label">🙏 感恩清單</div>
        ${gratHtml}
      </div>

      <div class="card" style="animation-delay:0.48s">
        <label class="card-label">🌟 今日行動（一小步就好）</label>
        <input class="field-input" type="text" placeholder="今天我會做的一件小事是⋯" value="${esc(f.action)}" oninput="updateForm('action',this.value)" />
      </div>

      <div class="closing-text">${esc(tc.closing)}</div>
    </div>

    <button class="save-btn ${saved?'saved':'unsaved'}" onclick="saveEntry()">
      ${saved ? '✿ 已儲存 ✿' : '✿ 儲存今日日記 ✿'}
    </button>`;
}

function updateForm(key, val) {
  state.form[key] = val;
  state.saved = false;
  const btn = document.querySelector('.save-btn');
  if (btn) { btn.className = 'save-btn unsaved'; btn.textContent = '✿ 儲存今日日記 ✿'; }
}

function saveEntry() {
  const newEntries = {
    ...state.entries,
    [state.todayKey]: {
      aiContent: state.todayContent,
      form: state.form,
      savedAt: new Date().toISOString(),
      theme: state.theme
    }
  };
  state.entries = newEntries;
  state.saved = true;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(newEntries));
  const btn = document.querySelector('.save-btn');
  if (btn) { btn.className = 'save-btn saved'; btn.textContent = '✿ 已儲存 ✿'; }
  showToast('已儲存今天的日記');
}

function renderHistory() {
  const entries = Object.entries(state.entries).sort(([a],[b]) => b.localeCompare(a));
  if (entries.length === 0) {
    document.getElementById('view-history').innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">🌸</div>
        <p class="empty-text">還沒有日記記錄<br/>從今天開始你的顯化旅程吧</p>
      </div>`;
    return;
  }
  document.getElementById('view-history').innerHTML = entries.map(([date, entry], i) => `
    <div class="card history-card" style="animation-delay:${i*0.06}s" onclick="showDetail('${date}')">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="flex:1">
          <div class="history-date">${date===state.todayKey?'今天 · ':''}${date.replace(/-/g,' · ')}</div>
          ${entry.aiContent ? `<div class="history-theme">✿ ${esc(entry.aiContent.date_theme)}</div>` : ''}
          ${entry.form?.attract ? `<p class="history-preview">「${esc(entry.form.attract.slice(0,28))}${entry.form.attract.length>28?'⋯':''}」</p>` : ''}
        </div>
        <span class="history-arrow">›</span>
      </div>
    </div>`).join('');
}

function showDetail(date) {
  state.selectedEntry = { date, entry: state.entries[date] };
  switchView('detail');
}

function renderDetail() {
  const { date, entry } = state.selectedEntry;
  const { aiContent, form: f } = entry;

  const fields = [
    { label:'今天我選擇吸引', value: f?.attract },
    { label:'我想成為', value: f?.become },
    { label:'自訂肯定句', value: f?.affirmation },
    { label:'已經實現', value: f?.realized },
  ].filter(x => x.value);

  const gratsHtml = [f?.gratitude1, f?.gratitude2, f?.gratitude3].filter(Boolean).map(g =>
    `<div style="display:flex;gap:10px;margin-bottom:8px;"><span style="color:var(--gold);font-weight:700;">✿</span><p style="margin:0;font-size:14px;line-height:1.75;color:var(--text);">${esc(g)}</p></div>`
  ).join('');

  document.getElementById('view-detail').innerHTML = `
    <button class="back-btn" onclick="switchView('history')">‹ 返回記錄</button>
    <div class="detail-header">
      <div class="detail-date">${date.replace(/-/g,' · ')}</div>
      ${aiContent ? `<div class="detail-theme">✿ ${esc(aiContent.date_theme)}</div>` : ''}
    </div>

    ${aiContent ? `
      <div class="card" style="background:var(--cream);border:1.5px solid var(--gold);text-align:center;">
        <p style="font-size:14px;line-height:1.9;color:var(--text);font-style:italic;">「${esc(aiContent.quote)}」</p>
      </div>` : ''}

    ${fields.map(({label,value}) =>`
      <div class="card">
        <div class="card-label" style="margin-bottom:6px;">${label}</div>
        <p style="margin:0;font-size:14px;line-height:1.8;color:var(--text);">${esc(value)}</p>
      </div>`).join('')}

    ${gratsHtml ? `
      <div class="card">
        <div class="card-label" style="margin-bottom:10px;">感恩清單</div>
        ${gratsHtml}
      </div>` : ''}

    ${f?.action ? `
      <div class="card">
        <div class="card-label" style="margin-bottom:6px;">今日行動</div>
        <p style="margin:0;font-size:14px;line-height:1.8;color:var(--text);">${esc(f.action)}</p>
      </div>` : ''}

    ${aiContent?.closing ? `<div class="closing-text">${esc(aiContent.closing)}</div>` : ''}`;
}

function switchView(view) {
  state.currentView = view;
  ['today','history','detail'].forEach(v => {
    document.getElementById('view-'+v).style.display = v===view ? 'block' : 'none';
    const btn = document.getElementById('nav-'+v);
    if (btn) { btn.className = 'nav-btn ' + (v===view?'active':'inactive'); }
  });
  if (view === 'history') renderHistory();
  if (view === 'detail') renderDetail();
  if (view === 'today' && state.todayContent) renderToday();
}

function openSettings() {
  document.getElementById('settings-modal').style.display = 'block';
  updateThemeUI();
}
function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
function closeSettingsIfOutside(e) { if (e.target === e.currentTarget) closeSettings(); }

function setTheme(theme) {
  state.theme = theme;
  localStorage.setItem(THEME_KEY, theme);
  applyTheme(theme);
  updateThemeUI();
  showToast('已切換主題顏色');
}
function applyTheme(theme) {
  const root = document.documentElement;
  if (theme === 'pink') {
    root.style.setProperty('--bg', '#FFF5F8');
    root.style.setProperty('--cream', '#FADDE6');
    root.style.setProperty('--gold', '#F2A7BC');
    root.style.setProperty('--brown', '#AD7D8B');
    root.style.setProperty('--text', '#6b4f58');
    root.style.setProperty('--muted', '#b18c98');
    root.style.setProperty('--border', '#f0c9d3');
    root.style.setProperty('--input-bg', '#fffafc');
  } else if (theme === 'green') {
    root.style.setProperty('--bg', '#F4FBF6');
    root.style.setProperty('--cream', '#DCEFD9');
    root.style.setProperty('--gold', '#9DCB9F');
    root.style.setProperty('--brown', '#728A73');
    root.style.setProperty('--text', '#49604a');
    root.style.setProperty('--muted', '#88a089');
    root.style.setProperty('--border', '#cfe4cf');
    root.style.setProperty('--input-bg', '#fcfffc');
  } else {
    root.style.setProperty('--bg', '#FBF7E9');
    root.style.setProperty('--cream', '#F4E4B2');
    root.style.setProperty('--gold', '#F1CC74');
    root.style.setProperty('--brown', '#9F8F82');
    root.style.setProperty('--text', '#5c4b3a');
    root.style.setProperty('--muted', '#a0917f');
    root.style.setProperty('--border', '#e8d9b0');
    root.style.setProperty('--input-bg', '#fffdf5');
  }
}
function updateThemeUI() {
  ['gold','pink','green'].forEach(t => {
    const el = document.getElementById('theme-' + t);
    if (el) el.classList.toggle('active', state.theme === t);
  });
}

async function exportImage() {
  closeSettings();
  await wait(150);
  const target = document.getElementById('export-target');
  const canvas = await html2canvas(target, { backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim(), scale: 2 });
  const link = document.createElement('a');
  link.download = `manifestation-journal-${state.todayKey}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('已匯出圖片');
}

async function exportPDF() {
  closeSettings();
  await wait(150);
  const target = document.getElementById('export-target');
  const canvas = await html2canvas(target, { backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim(), scale: 2 });
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const margin = 24;
  const usableWidth = pageWidth - margin * 2;
  const imgHeight = canvas.height * usableWidth / canvas.width;

  let y = margin;
  if (imgHeight <= pageHeight - margin * 2) {
    pdf.addImage(imgData, 'PNG', margin, y, usableWidth, imgHeight);
  } else {
    const ratio = usableWidth / canvas.width;
    const scaledPageHeight = (pageHeight - margin * 2) / ratio;
    let renderedHeight = 0;
    while (renderedHeight < canvas.height) {
      const pageCanvas = document.createElement('canvas');
      pageCanvas.width = canvas.width;
      pageCanvas.height = Math.min(scaledPageHeight, canvas.height - renderedHeight);
      const ctx = pageCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, renderedHeight, canvas.width, pageCanvas.height, 0, 0, canvas.width, pageCanvas.height);
      const pageData = pageCanvas.toDataURL('image/png');
      if (renderedHeight > 0) pdf.addPage();
      pdf.addImage(pageData, 'PNG', margin, margin, usableWidth, pageCanvas.height * ratio);
      renderedHeight += pageCanvas.height;
    }
  }
  pdf.save(`manifestation-journal-${state.todayKey}.pdf`);
  showToast('已匯出 PDF');
}

function clearAllEntries() {
  if (!confirm('確定要清除所有日記資料嗎？此動作無法復原。')) return;
  localStorage.removeItem(STORAGE_KEY);
  state.entries = {};
  state.saved = false;
  closeSettings();
  switchView('history');
  renderHistory();
  showToast('已清除所有日記資料');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
