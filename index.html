<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="顯化日記" />
  <meta name="theme-color" content="#FBF7E9" />
  <title>顯化日記 ✿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FBF7E9;
      --cream: #F4E4B2;
      --gold: #F1CC74;
      --brown: #9F8F82;
      --text: #5c4b3a;
      --muted: #a0917f;
      --border: #e8d9b0;
      --input-bg: #fffdf5;
    }

    html, body {
      background: var(--bg);
      font-family: 'Noto Serif TC', serif;
      color: var(--text);
      min-height: 100vh;
    }

    input, textarea, button { font-family: 'Noto Serif TC', serif; }
    textarea::placeholder, input::placeholder { color: #c4b49a; }
    textarea:focus, input:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(159,143,130,0.3); border-radius: 2px; }

    @keyframes floatDown {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.18; }
      90% { opacity: 0.1; }
      100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(241,204,116,0.15); }
      50% { box-shadow: 0 4px 40px rgba(241,204,116,0.38); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    #petals-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb1 {
      position: fixed;
      top: -120px;
      right: -120px;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(241,204,116,0.2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: gentleFloat 10s ease-in-out infinite;
    }
    .orb2 {
      position: fixed;
      bottom: -100px;
      left: -100px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244,228,178,0.28) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: gentleFloat 13s ease-in-out infinite reverse;
    }

    #app { max-width: 460px; margin: 0 auto; padding: 0 16px 100px; position: relative; z-index: 1; }

    .header { text-align: center; padding-top: 44px; padding-bottom: 4px; }
    .header-divider { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 14px; }
    .header-line { height: 1px; width: 40px; }
    .header-line-l { background: linear-gradient(to right, transparent, var(--gold)); }
    .header-line-r { background: linear-gradient(to left, transparent, var(--gold)); }
    .header-flower { font-size: 18px; color: var(--gold); }
    .header h1 { font-size: 24px; font-weight: 700; color: var(--brown); letter-spacing: 4px; margin-bottom: 6px; }
    .header .date-sub { color: var(--muted); font-size: 12px; letter-spacing: 2px; }

    .nav { display: flex; gap: 6px; margin-top: 22px; background: #f0e6c0; border-radius: 40px; padding: 4px; }
    .nav-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 36px;
      border: none;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Noto Serif TC', serif;
      transition: all 0.2s;
    }
    .nav-btn.active { background: var(--input-bg); color: var(--brown); font-weight: 700; box-shadow: 0 2px 8px rgba(159,143,130,0.12); }
    .nav-btn.inactive { background: transparent; color: var(--muted); font-weight: 400; }

    #setup-screen { animation: fadeIn 0.4s ease; text-align: center; padding: 40px 0; }
    .setup-card {
      background: var(--input-bg);
      border: 1.5px solid var(--gold);
      border-radius: 24px;
      padding: 32px 24px;
      margin-top: 24px;
      text-align: left;
      box-shadow: 0 4px 24px rgba(241,204,116,0.15);
      animation: softPulse 5s ease-in-out infinite;
    }
    .setup-card h2 { font-size: 16px; color: var(--brown); letter-spacing: 2px; margin-bottom: 8px; text-align: center; }
    .setup-card p { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 20px; text-align: center; }
    .setup-card .steps { font-size: 13px; color: var(--text); line-height: 2; margin-bottom: 20px; }
    .setup-card .steps a { color: var(--gold); }
    .key-input-wrap { display: flex; flex-direction: column; gap: 10px; }
    .key-input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      letter-spacing: 1px;
    }
    .key-input:focus { border-color: var(--gold); outline: none; }
    .key-save-btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: 1.5px solid var(--gold);
      background: linear-gradient(135deg, var(--gold), #e8b84b);
      color: #fff;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(241,204,116,0.4);
      animation: softPulse 3s ease-in-out infinite;
    }
    .key-note { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.7; }

    .card {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 14px rgba(159,143,130,0.07);
      animation: fadeInUp 0.45s ease both;
    }
    .card-gold {
      background: linear-gradient(135deg, var(--cream), #fef3cc);
      border: 1.5px solid var(--gold) !important;
      animation: fadeInUp 0.4s ease both, softPulse 5s ease-in-out infinite !important;
      text-align: center;
    }
    .card-label { font-size: 12px; color: var(--brown); letter-spacing: 2px; display: block; margin-bottom: 10px; font-weight: 700; }
    .date-theme-tag { font-size: 10px; color: var(--gold); letter-spacing: 4px; font-weight: 700; margin-bottom: 12px; }
    .quote-text { font-size: 16px; line-height: 1.95; color: var(--text); font-style: italic; }
    .affirm-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .affirm-row:last-child { margin-bottom: 0; }
    .affirm-check {
      background: var(--gold);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .affirm-text { font-size: 14px; line-height: 1.75; color: var(--text); }

    .field-input, .field-textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 15px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Noto Serif TC', serif;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .field-textarea { min-height: 78px; }
    .field-input:focus, .field-textarea:focus { border-color: var(--gold); outline: none; }

    .grat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .grat-row:last-child { margin-bottom: 0; }
    .grat-num {
      background: var(--cream);
      border: 1px solid var(--gold);
      color: var(--brown);
      font-size: 11px;
      font-weight: 700;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .save-btn {
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s;
    }
    .save-btn.unsaved {
      background: linear-gradient(135deg, var(--gold), #e8b84b);
      border: 1.5px solid var(--gold);
      color: #fff;
      box-shadow: 0 4px 20px rgba(241,204,116,0.4);
      animation: softPulse 3s ease-in-out infinite;
    }
    .save-btn.saved { background: #f0e8ce; border: 1.5px solid var(--border); color: var(--muted); }
    .closing-text { text-align: center; padding: 8px 0 20px; color: var(--muted); font-size: 13px; font-style: italic; line-height: 1.9; }

    .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 48px; }
    .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--gold); animation: spin 1s linear infinite; }
    .loading-text { color: var(--muted); font-size: 14px; letter-spacing: 2px; }

    .history-card { cursor: pointer; transition: all 0.2s; }
    .history-card:hover { border-color: var(--gold) !important; box-shadow: 0 4px 20px rgba(241,204,116,0.2) !important; }
    .history-date { font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 5px; font-weight: 700; }
    .history-theme { font-size: 13px; color: var(--brown); letter-spacing: 1px; }
    .history-preview { margin-top: 7px; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .history-arrow { color: var(--border); font-size: 20px; margin-left: 12px; }
    .empty-state { text-align: center; padding: 60px 0; color: var(--muted); }
    .empty-emoji { font-size: 40px; margin-bottom: 16px; }
    .empty-text { font-size: 14px; line-height: 1.9; }

    .back-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 8px 0; letter-spacing: 1px; font-family: 'Noto Serif TC', serif; }
    .detail-header { text-align: center; margin: 8px 0 22px; }
    .detail-date { font-size: 11px; color: var(--gold); letter-spacing: 3px; margin-bottom: 5px; font-weight: 700; }
    .detail-theme { font-size: 16px; color: var(--brown); font-weight: 700; }

    .settings-btn {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--cream);
      border: 1.5px solid var(--gold);
      color: var(--brown);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(159,143,130,0.2);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(251,247,233,0.85);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s;
    }
    .modal-sheet {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 28px 28px 0 0;
      padding: 28px 24px 48px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 -4px 30px rgba(159,143,130,0.15);
      animation: slideUp 0.3s ease;
    }
    .modal-title { font-size: 14px; color: var(--brown); letter-spacing: 2px; font-weight: 700; margin-bottom: 16px; }
    .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
    .modal-key-display {
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      letter-spacing: 1px;
      margin-bottom: 12px;
      word-break: break-all;
    }
    .modal-change-btn {
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--brown);
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Noto Serif TC', serif;
      margin-bottom: 10px;
    }
    .modal-delete-btn {
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      border: 1.5px solid #f5b8b8;
      background: transparent;
      color: #c07070;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Noto Serif TC', serif;
    }

    #view-today, #view-history, #view-detail { animation: fadeInUp 0.3s ease both; }
  </style>
</head>
<body>
  <div id="petals-container"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>

  <div id="app">
    <div class="header">
      <div class="header-divider">
        <div class="header-line header-line-l"></div>
        <span class="header-flower">✿</span>
        <div class="header-line header-line-r"></div>
      </div>
      <h1>顯化日記</h1>
      <p class="date-sub" id="date-display"></p>
    </div>

    <div id="setup-screen" style="display:none;">
      <div class="setup-card">
        <h2>✿ 開始書寫 ✿</h2>
        <p>這個版本不需要 API。<br />每天都會自動給你一段溫柔的顯化引導。</p>
        <div class="steps">
          1. 打開頁面就能開始<br />
          2. 每天會依日期顯示不同主題<br />
          3. 按下「儲存今日日記」會保存在你的裝置<br />
          4. 之後可在「歷史記錄」回看
        </div>
        <div class="key-input-wrap">
          <button class="key-save-btn" onclick="startJournal()">✿ 開始今天的日記 ✿</button>
        </div>
        <p class="key-note" style="margin-top:14px;">內容與紀錄只會存在你的裝置 localStorage。<br />不用登入，也不用額外設定。</p>
      </div>
    </div>

    <div id="main-app" style="display:none;">
      <nav class="nav">
        <button class="nav-btn active" id="nav-today" onclick="switchView('today')">✿ 今日日記</button>
        <button class="nav-btn inactive" id="nav-history" onclick="switchView('history')">◎ 歷史記錄</button>
      </nav>

      <div id="view-today" style="margin-top:24px;"></div>
      <div id="view-history" style="margin-top:24px;display:none;"></div>
      <div id="view-detail" style="margin-top:20px;display:none;"></div>
    </div>
  </div>

  <button class="settings-btn" onclick="openSettings()" title="設定">⚙</button>

  <div id="settings-modal" style="display:none;">
    <div class="modal-overlay" onclick="closeSettingsIfOutside(event)">
      <div class="modal-sheet">
        <button class="modal-close" onclick="closeSettings()">×</button>
        <div class="modal-title">⚙ 日記設定</div>
        <div class="modal-key-display" id="key-display"></div>
        <button class="modal-change-btn" onclick="resetToday()">重新生成今日引導</button>
        <button class="modal-delete-btn" onclick="clearAllEntries()">清除所有日記資料</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'manifestation_journal_entries';
    const THEMES = ['自信', '豐盛', '愛與連結', '健康', '勇氣', '平靜', '信任', '喜悅'];

    let state = {
      entries: {},
      todayContent: null,
      form: {
        attract: '',
        become: '',
        affirmation: '',
        realized: '',
        gratitude1: '',
        gratitude2: '',
        gratitude3: '',
        action: ''
      },
      saved: false,
      currentView: 'today',
      selectedEntry: null,
    };

    const now = new Date();
    const todayKey = getLocalDateKey(now);
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    const weekday = weekdays[now.getDay()];

    const PRESET_LIBRARY = [
      { date_theme: '心光安定', quote: '當你安住在自己心裡，想要的生活就會慢慢靠近。', affirmations: ['我值得被溫柔對待', '我的節奏剛剛好', '我信任生命正帶我走向更好的地方'], question1: '今天我願意吸引哪些平靜而美好的事物？', question2: '今天的我，已經成為了怎樣更穩定、更柔韌的人？', closing: '放鬆一點，你正在變成自己喜歡的樣子。' },
      { date_theme: '豐盛之流', quote: '你付出的善意、努力與真心，都會以自己的方式回到你身上。', affirmations: ['我向豐盛敞開', '我擁有創造幸福的能力', '好事正在向我聚集'], question1: '今天有哪些豐盛，已經悄悄來到我的生命裡？', question2: '今天的我，已經成為了一個更願意接住美好的人嗎？', closing: '願你看見自己早已擁有的豐盛。' },
      { date_theme: '愛的迴響', quote: '當你真心對待自己，也會更自然地接住外界的愛與善意。', affirmations: ['我值得被愛', '我能自在表達真實感受', '我的世界充滿溫暖連結'], question1: '今天我想吸引什麼樣的愛與連結進入生命？', question2: '今天的我，已成為一個更懂得愛自己的人了嗎？', closing: '願你被理解，也被自己溫柔擁抱。' },
      { date_theme: '勇氣生長', quote: '你不需要一下子變得很厲害，只要願意往前一步，就已經很勇敢。', affirmations: ['我有勇氣面對未知', '我相信自己的力量', '我可以一步一步完成重要的事'], question1: '今天我願意吸引哪一種支持，陪我往前走？', question2: '今天的我，已經成為那個敢於行動的人了嗎？', closing: '你不需要完美，也能閃閃發亮。' },
      { date_theme: '身心和暖', quote: '你的身體一直在陪你生活，今天也別忘了好好照顧它。', affirmations: ['我珍惜自己的身心狀態', '我允許自己休息與恢復', '健康與平衡正穩穩流向我'], question1: '今天有哪些讓我感到舒展、輕盈、被照顧的事情？', question2: '今天的我，已經更會照顧自己的身心了嗎？', closing: '溫柔對待自己，就是最深的療癒。' },
      { date_theme: '喜悅綻放', quote: '快樂不一定很大聲，它也可能藏在一個平凡卻真實的瞬間裡。', affirmations: ['我允許自己感到快樂', '我能看見生活中的小小驚喜', '喜悅正自然流進我的日常'], question1: '今天有哪些值得我微笑收下的小幸福？', question2: '今天的我，已經成為更自在、更明亮的人了嗎？', closing: '願你今天也被細小而真實的幸福照亮。' },
      { date_theme: '信任展開', quote: '有些答案不會立刻出現，但每一步都在把你帶往更合適的地方。', affirmations: ['我信任事情會在對的時機展開', '我不必急著證明什麼', '我正在走向屬於自己的路'], question1: '今天我想吸引什麼樣的機會與方向感進入生命？', question2: '今天的我，已經成為更相信自己的人了嗎？', closing: '請相信，你不是停滯，只是在醞釀。' },
      { date_theme: '閃耀自信', quote: '你不需要先被誰肯定，才有資格相信自己本來就很好。', affirmations: ['我欣賞真實的自己', '我可以自信地表達所想所愛', '我的存在本身就有價值'], question1: '今天我願意吸引哪些讓我更相信自己的經驗？', question2: '今天的我，已經更自在地活成自己了嗎？', closing: '你的光一直都在，只是今天更亮了一點。' }
    ];

    (function initPetals() {
      const container = document.getElementById('petals-container');
      for (let i = 0; i < 16; i++) {
        const p = document.createElement('div');
        const x = Math.random() * 100;
        const delay = Math.random() * 8;
        const duration = Math.random() * 6 + 8;
        const size = Math.random() * 8 + 5;
        const colors = ['#F1CC74', '#F4E4B2', '#f5e8c8'];
        p.style.cssText = `position:absolute;left:${x}%;top:-20px;width:${size}px;height:${size}px;border-radius:50% 0 50% 0;background:${colors[i % 3]};opacity:0.18;animation:floatDown ${duration}s ${delay}s linear infinite;`;
        container.appendChild(p);
      }
    })();

    document.getElementById('date-display').textContent = `${todayKey.replace(/-/g, ' · ')} · 週${weekday}`;

    window.onload = function () {
      try {
        state.entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        state.entries = {};
      }

      if (localStorage.getItem('manifestation_journal_started') === 'yes') {
        showMainApp();
        loadTodayOrGenerate();
      } else {
        showSetup();
      }
    };

    function getLocalDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function showSetup() {
      document.getElementById('setup-screen').style.display = 'block';
      document.getElementById('main-app').style.display = 'none';
    }

    function showMainApp() {
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
    }

    function startJournal() {
      localStorage.setItem('manifestation_journal_started', 'yes');
      showMainApp();
      loadTodayOrGenerate();
    }

    function loadTodayOrGenerate() {
      if (state.entries[todayKey]) {
        state.todayContent = state.entries[todayKey].aiContent;
        state.form = state.entries[todayKey].form || { ...state.form };
        state.saved = true;
        renderToday();
        return;
      }
      generateToday();
    }

    function generateToday() {
      renderLoading();
      setTimeout(() => {
        state.todayContent = getPresetForDate(todayKey);
        state.form = {
          attract: '',
          become: '',
          affirmation: '',
          realized: '',
          gratitude1: '',
          gratitude2: '',
          gratitude3: '',
          action: ''
        };
        state.saved = false;
        renderToday();
      }, 450);
    }

    function getPresetForDate(dateKey) {
      const seed = dateKey.split('-').join('').split('').reduce((sum, n) => sum + Number(n), 0);
      const base = PRESET_LIBRARY[seed % PRESET_LIBRARY.length];
      return JSON.parse(JSON.stringify(base));
    }

    function renderLoading() {
      document.getElementById('view-today').innerHTML = `
        <div class="loading-wrap">
          <div class="spinner"></div>
          <p class="loading-text">今日暖語準備中⋯</p>
        </div>`;
    }

    function renderToday() {
      if (!state.todayContent) return;

      const tc = state.todayContent;
      const f = state.form;
      const saved = state.saved;

      const affirmHtml = tc.affirmations.map(a => `
        <div class="affirm-row">
          <span class="affirm-check">✓</span>
          <span class="affirm-text">${esc(a)}</span>
        </div>`).join('');

      const fields = [
        { icon: '🌼', label: '今天我選擇吸引', key: 'attract', hint: tc.question1, multi: true },
        { icon: '🌱', label: '我今天想成為', key: 'become', hint: tc.question2, multi: true },
        { icon: '💛', label: '自訂肯定句', key: 'affirmation', hint: '寫下一句屬於你的肯定句', multi: false },
        { icon: '✨', label: '已經實現（用已發生的語氣）', key: 'realized', hint: '感謝宇宙，我已經⋯', multi: true },
      ];

      const fieldsHtml = fields.map((fd, i) => `
        <div class="card" style="animation-delay:${0.13 + i * 0.07}s">
          <label class="card-label">${fd.icon} ${fd.label}</label>
          ${fd.multi
            ? `<textarea class="field-textarea" placeholder="${esc(fd.hint)}" oninput="updateForm('${fd.key}', this.value)">${esc(f[fd.key])}</textarea>`
            : `<input class="field-input" type="text" placeholder="${esc(fd.hint)}" value="${escAttr(f[fd.key])}" oninput="updateForm('${fd.key}', this.value)" />`
          }
        </div>`).join('');

      const gratitudePlaceholders = ['我感恩⋯', '我感謝⋯', '宇宙給了我⋯'];
      const gratitudeKeys = ['gratitude1', 'gratitude2', 'gratitude3'];
      const gratHtml = gratitudeKeys.map((key, i) => `
        <div class="grat-row">
          <span class="grat-num">${i + 1}</span>
          <input class="field-input" type="text" placeholder="${gratitudePlaceholders[i]}" value="${escAttr(f[key])}" oninput="updateForm('${key}', this.value)" />
        </div>`).join('');

      document.getElementById('view-today').innerHTML = `
        <div class="card card-gold" style="border-radius:24px;padding:24px 22px;">
          <div class="date-theme-tag">✦ ${esc(tc.date_theme)} ✦</div>
          <p class="quote-text">「${esc(tc.quote)}」</p>
        </div>

        <div class="card" style="animation-delay:0.08s">
          <div class="card-label">今日肯定句</div>
          ${affirmHtml}
        </div>

        ${fieldsHtml}

        <div class="card" style="animation-delay:0.41s">
          <div class="card-label">🙏 感恩清單</div>
          ${gratHtml}
        </div>

        <div class="card" style="animation-delay:0.48s">
          <label class="card-label">🌟 今日行動（一小步就好）</label>
          <input class="field-input" type="text" placeholder="今天我會做的一件小事是⋯" value="${escAttr(f.action)}" oninput="updateForm('action', this.value)" />
        </div>

        <div class="closing-text">${esc(tc.closing)}</div>

        <button class="save-btn ${saved ? 'saved' : 'unsaved'}" onclick="saveEntry()">
          ${saved ? '✿ 已儲存 ✿' : '✿ 儲存今日日記 ✿'}
        </button>`;
    }

    function updateForm(key, val) {
      state.form[key] = val;
      state.saved = false;
      const btn = document.querySelector('.save-btn');
      if (btn) {
        btn.className = 'save-btn unsaved';
        btn.textContent = '✿ 儲存今日日記 ✿';
      }
    }

    function saveEntry() {
      const newEntries = {
        ...state.entries,
        [todayKey]: {
          aiContent: state.todayContent,
          form: state.form,
          savedAt: new Date().toISOString()
        }
      };
      state.entries = newEntries;
      state.saved = true;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newEntries));
      const btn = document.querySelector('.save-btn');
      if (btn) {
        btn.className = 'save-btn saved';
        btn.textContent = '✿ 已儲存 ✿';
      }
    }

    function renderHistory() {
      const entries = Object.entries(state.entries).sort(([a], [b]) => b.localeCompare(a));

      if (entries.length === 0) {
        document.getElementById('view-history').innerHTML = `
          <div class="empty-state">
            <div class="empty-emoji">🌸</div>
            <p class="empty-text">還沒有日記記錄<br />從今天開始你的顯化旅程吧</p>
          </div>`;
        return;
      }

      document.getElementById('view-history').innerHTML = entries.map(([date, entry], i) => {
        const preview = entry.form?.attract || '';
        return `
          <div class="card history-card" style="animation-delay:${i * 0.06}s" onclick="showDetail('${date}')">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div style="flex:1">
                <div class="history-date">${date === todayKey ? '今天 · ' : ''}${date.replace(/-/g, ' · ')}</div>
                ${entry.aiContent ? `<div class="history-theme">✿ ${esc(entry.aiContent.date_theme)}</div>` : ''}
                ${preview ? `<p class="history-preview">「${esc(preview.slice(0, 28))}${preview.length > 28 ? '⋯' : ''}」</p>` : ''}
              </div>
              <span class="history-arrow">›</span>
            </div>
          </div>`;
      }).join('');
    }

    function showDetail(date) {
      state.selectedEntry = { date, entry: state.entries[date] };
      switchView('detail');
    }

    function renderDetail() {
      const { date, entry } = state.selectedEntry;
      const { aiContent, form: f } = entry;

      const fields = [
        { label: '今天我選擇吸引', value: f?.attract },
        { label: '我想成為', value: f?.become },
        { label: '自訂肯定句', value: f?.affirmation },
        { label: '已經實現', value: f?.realized },
      ].filter(x => x.value);

      const gratsHtml = [f?.gratitude1, f?.gratitude2, f?.gratitude3]
        .filter(Boolean)
        .map(g => `
          <div style="display:flex;gap:10px;margin-bottom:8px;">
            <span style="color:var(--gold);font-weight:700;">✿</span>
            <p style="margin:0;font-size:14px;line-height:1.75;color:var(--text);">${esc(g)}</p>
          </div>`)
        .join('');

      document.getElementById('view-detail').innerHTML = `
        <button class="back-btn" onclick="switchView('history')">‹ 返回記錄</button>
        <div class="detail-header">
          <div class="detail-date">${date.replace(/-/g, ' · ')}</div>
          ${aiContent ? `<div class="detail-theme">✿ ${esc(aiContent.date_theme)}</div>` : ''}
        </div>

        ${aiContent ? `
          <div class="card" style="background:var(--cream);border:1.5px solid var(--gold);text-align:center;">
            <p style="font-size:14px;line-height:1.9;color:var(--text);font-style:italic;">「${esc(aiContent.quote)}」</p>
          </div>` : ''}

        ${fields.map(({ label, value }) => `
          <div class="card">
            <div class="card-label" style="margin-bottom:6px;">${label}</div>
            <p style="margin:0;font-size:14px;line-height:1.8;color:var(--text);">${esc(value)}</p>
          </div>`).join('')}

        ${gratsHtml ? `
          <div class="card">
            <div class="card-label" style="margin-bottom:10px;">感恩清單</div>
            ${gratsHtml}
          </div>` : ''}

        ${f?.action ? `
          <div class="card">
            <div class="card-label" style="margin-bottom:6px;">今日行動</div>
            <p style="margin:0;font-size:14px;line-height:1.8;color:var(--text);">${esc(f.action)}</p>
          </div>` : ''}

        ${aiContent?.closing ? `<div class="closing-text">${esc(aiContent.closing)}</div>` : ''}`;
    }

    function switchView(view) {
      state.currentView = view;
      ['today', 'history', 'detail'].forEach(v => {
        document.getElementById('view-' + v).style.display = v === view ? 'block' : 'none';
        const btn = document.getElementById('nav-' + v);
        if (btn) {
          btn.className = 'nav-btn ' + (v === view ? 'active' : 'inactive');
        }
      });

      if (view === 'history') renderHistory();
      if (view === 'detail') renderDetail();
      if (view === 'today' && state.todayContent) renderToday();
    }

    function openSettings() {
      document.getElementById('key-display').textContent = `已儲存 ${Object.keys(state.entries).length} 篇日記`;
      document.getElementById('settings-modal').style.display = 'block';
    }

    function closeSettings() {
      document.getElementById('settings-modal').style.display = 'none';
    }

    function closeSettingsIfOutside(e) {
      if (e.target === e.currentTarget) closeSettings();
    }

    function resetToday() {
      closeSettings();
      if (!confirm('要重新生成今天的引導內容嗎？今天尚未儲存的文字會被清空。')) return;
      delete state.entries[todayKey];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
      generateToday();
    }

    function clearAllEntries() {
      if (!confirm('確定要清除所有日記資料嗎？這個動作無法復原。')) return;
      state.entries = {};
      state.todayContent = null;
      state.selectedEntry = null;
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem('manifestation_journal_started');
      closeSettings();
      showSetup();
    }

    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escAttr(str) {
      return esc(str);
    }
  </script>
</body>
</html>
