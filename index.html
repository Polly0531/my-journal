<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顯化日記</title>

<style>
:root{
  --bg:#FBF7E9;
  --card:#fffdf5;
  --gold:#F1CC74;
  --text:#5c4b3a;
  --muted:#a0917f;
}

body{
  margin:0;
  padding:16px;
  font-family:"Noto Serif TC", serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  text-align:center;
  margin:30px 0 10px;
}

.header h1{
  letter-spacing:4px;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 2px 14px rgba(0,0,0,0.05);
}

.label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

textarea,input{
  width:100%;
  border-radius:12px;
  border:1px solid #eee;
  padding:10px;
}

textarea{min-height:70px;}

.btn{
  width:100%;
  padding:14px;
  border-radius:40px;
  border:none;
  background:var(--gold);
  color:white;
  margin-top:10px;
}

.history-item{
  padding:8px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="header">
<h1>顯化日記 ✿</h1>
<p id="quote"></p>
</div>

<div class="card">
<div class="label">今天我選擇吸引</div>
<textarea id="attract"></textarea>
</div>

<div class="card">
<div class="label">我想成為</div>
<textarea id="become"></textarea>
</div>

<div class="card">
<div class="label">自訂肯定句</div>
<input id="affirm">
</div>

<div class="card">
<div class="label">已經實現</div>
<textarea id="realized"></textarea>
</div>

<div class="card">
<div class="label">感恩清單</div>
<input id="g1">
<input id="g2">
<input id="g3">
</div>

<div class="card">
<div class="label">今日行動</div>
<input id="action">
</div>

<button class="btn" onclick="save()">儲存</button>
<button class="btn" onclick="toggleHistory()">歷史記錄</button>
<button class="btn" onclick="exportIG()">IG分享</button>

<div class="card" id="history" style="display:none;"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const quotes=[
"你所渴望的正在向你靠近",
"一切正在為你展開",
"你值得擁有美好的一切",
"宇宙正在支持你",
"你已經在成為你想成為的人"
];

const today=new Date().toISOString().slice(0,10);
document.getElementById("quote").innerText=
quotes[new Date().getDate()%quotes.length];

// 讀取
const saved=JSON.parse(localStorage.getItem(today)||"{}");
["attract","become","affirm","realized","g1","g2","g3","action"]
.forEach(id=>{
document.getElementById(id).value=saved[id]||"";
});

// 儲存
function save(){
const data={};
["attract","become","affirm","realized","g1","g2","g3","action"]
.forEach(id=>{
data[id]=document.getElementById(id).value;
});
localStorage.setItem(today,JSON.stringify(data));
alert("已儲存 ✨");
}

// 歷史
function toggleHistory(){
const el=document.getElementById("history");
el.style.display=el.style.display==="none"?"block":"none";

el.innerHTML="";
Object.keys(localStorage).sort().reverse().forEach(date=>{
try{
const div=document.createElement("div");
div.className="history-item";
div.innerText=date;

div.onclick=()=>{
const d=JSON.parse(localStorage.getItem(date));
["attract","become","affirm","realized","g1","g2","g3","action"]
.forEach(id=>{
document.getElementById(id).value=d[id]||"";
});
};

el.appendChild(div);
}catch{}
});
}

// IG卡片
function exportIG(){
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=1080;
canvas.height=1920;

ctx.fillStyle="#FBF7E9";
ctx.fillRect(0,0,1080,1920);

ctx.fillStyle="#5c4b3a";
ctx.font="bold 60px serif";
ctx.textAlign="center";

ctx.fillText("顯化日記 ✿",540,200);

ctx.font="30px serif";
ctx.fillText(document.getElementById("attract").value,540,500);

const link=document.createElement("a");
link.download="journal.png";
link.href=canvas.toDataURL();
link.click();
}
</script>

</body>
</html>
