<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顯化日記</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: sans-serif;
  background: var(--bg);
  margin:0;
  padding:20px;
  text-align:center;
}

:root{
  --bg:#FBF7E9;
  --main:#F1CC74;
}

.theme-pink{ --bg:#FDF2F5; --main:#E8A0BF;}
.theme-green{ --bg:#EEF7F2; --main:#7BBF9A;}

.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  margin:15px 0;
}

input, textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:var(--main);
  color:white;
}
</style>
</head>

<body>

<h2>顯化日記 ✿</h2>

<div class="card">
  <h3 id="quote"></h3>
</div>

<div class="card">
  <textarea id="text" placeholder="寫下今天的顯化日記..."></textarea>
  <button onclick="save()">儲存</button>
  <button onclick="download()">下載圖片</button>
</div>

<div class="card">
  <p>主題顏色</p>
  <button onclick="setTheme('')">金</button>
  <button onclick="setTheme('theme-pink')">粉</button>
  <button onclick="setTheme('theme-green')">綠</button>
</div>

<script>
const quotes = [
"你所渴望的正在向你靠近",
"一切正在為你展開",
"你已經在成為你想成為的人",
"宇宙正在支持你",
"你值得擁有美好的一切"
];

document.getElementById("quote").innerText =
quotes[new Date().getDate() % quotes.length];

const today = new Date().toISOString().slice(0,10);

function save(){
  localStorage.setItem(today, document.getElementById("text").value);
  alert("已儲存 ✨");
}

document.getElementById("text").value =
localStorage.getItem(today) || "";

function setTheme(t){
  document.body.className = t;
}

function download(){
  const text = document.getElementById("text").value;
  const blob = new Blob([text], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "journal.txt";
  a.click();
}
</script>

</body>
</html>
