<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>顯化日記 ✿</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>
:root{
  --bg:#FBF7E9;
  --gold:#F1CC74;
  --text:#5c4b3a;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

.container{
  padding:20px;
  max-width:500px;
  margin:auto;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

button{
  padding:12px;
  border-radius:20px;
  border:none;
  background:var(--gold);
  color:white;
  margin:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>顯化日記 ✿</h1>

<div class="card" id="content"></div>

<button onclick="exportImage()">下載圖片</button>

<div class="card">
<p>主題顏色</p>
<button onclick="setTheme('gold')">金</button>
<button onclick="setTheme('pink')">粉</button>
<button onclick="setTheme('green')">綠</button>
</div>

</div>

<script>

const CONTENT = [
{
theme:'溫柔顯化',
quote:'你所渴望的一切，都在靠近你',
affirm:['我值得','宇宙支持我','一切展開']
},
{
theme:'豐盛流動',
quote:'豐盛來自允許',
affirm:['我接受','我開放','資源流向我']
},
{
theme:'愛與連結',
quote:'你本身就是愛',
affirm:['我被愛','我給愛','我連結']
}
];

function load(){
  const i = new Date().getDate()%CONTENT.length;
  const d = CONTENT[i];

  document.getElementById('content').innerHTML = `
    <h3>${d.theme}</h3>
    <p>${d.quote}</p>
    <p>${d.affirm.join('<br>')}</p>
  `;
}

function setTheme(t){
  if(t==='pink'){
    document.documentElement.style.setProperty('--bg','#fff0f5');
  }
  if(t==='green'){
    document.documentElement.style.setProperty('--bg','#f3fbf6');
  }
  if(t==='gold'){
    document.documentElement.style.setProperty('--bg','#FBF7E9');
  }
}

function exportImage(){
  html2canvas(document.body).then(c=>{
    let a=document.createElement('a');
    a.href=c.toDataURL();
    a.download='journal.png';
    a.click();
  });
}

load();

</script>

</body>
</html>
